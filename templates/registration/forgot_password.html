{% extends 'base.html' %}

{% block title %}Forgot Password | FurniFlex{% endblock %}

{% block page_skeleton %}
<div class="container py-5">
    <div class="row justify-content-center py-5">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden" style="background: white;">
                <div class="card-body p-5 text-center">
                    <div class="skeleton-shimmer mb-4 mx-auto" style="width: 80px; height: 80px; border-radius: 50%;"></div>
                    <div class="skeleton-shimmer mb-2 mx-auto" style="width: 200px; height: 28px; border-radius: 4px;"></div>
                    <div class="skeleton-shimmer mb-5 mx-auto" style="width: 280px; height: 16px; border-radius: 4px;"></div>
                    
                    <div class="mb-4 text-start">
                        <div class="skeleton-shimmer mb-2" style="width: 110px; height: 18px; border-radius: 4px;"></div>
                        <div class="skeleton-shimmer" style="width: 100%; height: 50px; border-radius: 4px;"></div>
                    </div>
                    
                    <div class="mb-4">
                        <div class="skeleton-shimmer" style="width: 100%; height: 50px; border-radius: 25px;"></div>
                    </div>
                    
                    <div class="skeleton-shimmer mx-auto" style="width: 120px; height: 18px; border-radius: 4px;"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center py-5">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="bg-primary-subtle text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                            <i class="fas fa-key fa-2x"></i>
                        </div>
                        <h2 class="fw-bold">Forgot Password?</h2>
                        <p class="text-muted">Enter your email address and we'll send you an OTP to reset your password.</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label for="email" class="form-label fw-semibold">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-envelope text-muted"></i></span>
                                <input type="email" name="email" id="email" class="form-control bg-light border-0 py-3" placeholder="example@email.com" required>
                            </div>
                        </div>

                        <div class="d-grid mb-4">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill py-3 fw-bold shadow-sm">Send OTP</button>
                        </div>

                        <div class="text-center">
                            <a href="{% url 'login' %}" class="text-decoration-none text-muted">
                                <i class="fas fa-arrow-left me-2 small"></i>Back to Login
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
